<section class="sample-form-page">
  <h2>Sample Form</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="form-row">
      <label for="name">Name</label>
      <lib-control-text-field formControlName="name"></lib-control-text-field>
      @if (hasError('name', 'required')) {
        <p class="error-message">Name is required.</p>
      }
    </div>

    <div class="form-row">
      <label for="description">Description</label>
      <lib-control-textarea-field formControlName="description"></lib-control-textarea-field>
      @if (hasError('description', 'minlength')) {
        <p class="error-message">Description must be at least 10 characters.</p>
      }
    </div>

    <div class="form-row">
      <label for="category">Category</label>
      <lib-control-select-field formControlName="category" [options]="categoryOptions"></lib-control-select-field>
      @if (hasError('category', 'required')) {
        <p class="error-message">Category is required.</p>
      }
    </div>

    <button type="submit" [disabled]="form.invalid">Submit</button>
  </form>
</section>

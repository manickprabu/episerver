<app-page-shell
  eyebrow="Migration Base"
  title="Angular placeholder app"
  description="This app mirrors the React package at a high level so we can migrate features into a clean Angular 21 standalone structure."
>
  <div class="home-grid">
    <article>
      <h3>Mapped high-level routes</h3>
      <ul>
        <li><a routerLink="/forms">Form rendering entry</a></li>
        <li><a routerLink="/forms/container">Render from provided form JSON</a></li>
        <li><a routerLink="/forms/login">Login/auth surface</a></li>
        <li><a routerLink="/forms/sample">Sample custom control form</a></li>
        <li><a routerLink="/forms/steps/sample-step">Multi-step route placeholder</a></li>
      </ul>
    </article>

    <article>
      <h3>Scaffold folders</h3>
      <ul>
        <li><code>shared/</code> for reusable UI</li>
        <li><code>core/</code> for services and API clients</li>
        <li><code>features/</code> for route-level pages</li>
      </ul>
    </article>
  </div>
</app-page-shell>

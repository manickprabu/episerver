<button [id]="field().key" type="submit" class="Form__Element FormSubmitButton" [disabled]="disabled()">
  @if (field().properties.image) {
    <img [src]="$any(field().properties.image)" [alt]="field().properties.label || 'Submit'" />
  } @else {
    {{ field().properties.label || 'Submit' }}
  }
</button>
